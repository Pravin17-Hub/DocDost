apiVersion: apps/v1
kind: Deployment
metadata:
  name: docdost-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docdost-frontend
  template:
    metadata:
      labels:
        app: docdost-frontend
    spec:
      containers:
      - name: frontend
        image: docdost-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: docdost-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
