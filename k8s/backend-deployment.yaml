apiVersion: apps/v1
kind: Deployment
metadata:
  name: docdost-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docdost-backend
  template:
    metadata:
      labels:
        app: docdost-backend
    spec:
      containers:
      - name: backend
        image: docdost-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: docdost-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: docdost-backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
